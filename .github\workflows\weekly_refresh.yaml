name: Weekly FAQ Refresh

on:
  schedule:
    # Dimanche 05:00 UTC (06:00 Paris hiver / 07:00 été)
    - cron: "0 5 * * 0"
  workflow_dispatch:  # run manuel possible depuis l'onglet Actions

concurrency:
  group: faq-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Si ce step échoue (exit != 0), les steps suivants ne tournent pas
      # → aucun commit, le JSON précédent reste intact.
      - name: Run scraper
        run: python scrape_faq.py

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/faq_lpb.json
          if git diff --cached --quiet; then
            echo "Pas de changement dans le JSON — rien à commiter."
          else
            STATS=$(python -c "import json; d=json.load(open('data/faq_lpb.json')); print(f\"{d['stats']['category_count']} catégories, {d['stats']['article_count']} articles\")")
            git commit -m "chore(data): refresh FAQ — $(date -u +%Y-%m-%d) [${STATS}]"
            git push
          fi
